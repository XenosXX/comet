name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm test:coverage

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./assets/skills/comet/scripts

  bats-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run shell tests
        run: bats test/shell/*.bats

  script-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Comet script smoke tests
        run: pnpm test -- test/ts/comet-scripts.test.ts

      - name: Run portable shell tests
        run: pnpm test:shell

  init-e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec@latest

      - name: Create temp project directory with all platform markers
        run: |
          PROJ="$RUNNER_TEMP/comet-e2e-project"
          for dir in .claude .cursor .codex .opencode .windsurf .cline .roo \
                     .continue .gemini .amazonq .qwen .kilocode .augment .kiro \
                     .lingma .junie .codebuddy .cospec .crush .factory .iflow \
                     .pi .qoder .agent .bob .forge .trae; do
            mkdir -p "$PROJ/$dir"
          done
          mkdir -p "$PROJ/.github/copilot-instructions.md"
          echo "marker" > "$PROJ/.github/copilot-instructions.md"
        shell: bash

      - name: Run comet init (project scope, all platforms)
        run: node bin/comet.js init "$RUNNER_TEMP/comet-e2e-project" --yes --json
        shell: bash

      - name: Verify Comet skills on all platforms (project)
        run: |
          PROJ="$RUNNER_TEMP/comet-e2e-project"
          SKILLS_DIRS=(
            ".claude/skills"
            ".cursor/skills"
            ".codex/skills"
            ".opencode/skills"
            ".windsurf/skills"
            ".cline/skills"
            ".roo/skills"
            ".continue/skills"
            ".gemini/skills"
            ".amazonq/skills"
            ".qwen/skills"
            ".kilocode/skills"
            ".augment/skills"
            ".kiro/skills"
            ".lingma/skills"
            ".junie/skills"
            ".codebuddy/skills"
            ".cospec/skills"
            ".crush/skills"
            ".factory/skills"
            ".iflow/skills"
            ".pi/skills"
            ".qoder/skills"
            ".agent/skills"
            ".bob/skills"
            ".forge/skills"
            ".trae/skills"
          )
          for sd in "${SKILLS_DIRS[@]}"; do
            test -f "$PROJ/$sd/comet/SKILL.md"
            test -f "$PROJ/$sd/comet/scripts/comet-guard.sh"
            test -f "$PROJ/$sd/comet/scripts/comet-state.sh"
            test -f "$PROJ/$sd/comet/scripts/comet-handoff.sh"
            test -f "$PROJ/$sd/comet/scripts/comet-yaml-validate.sh"
            test -f "$PROJ/$sd/comet/scripts/comet-archive.sh"
          done
          # github-copilot uses .github/skills
          test -f "$PROJ/.github/skills/comet/SKILL.md"
          test -f "$PROJ/.github/skills/comet/scripts/comet-guard.sh"
          echo "All 28 platforms Comet skills: OK"
        shell: bash

      - name: Verify Superpowers on all platforms (project)
        run: |
          PROJ="$RUNNER_TEMP/comet-e2e-project"
          SKILLS_DIRS=(
            ".claude/skills"
            ".cursor/skills"
            ".codex/skills"
            ".opencode/skills"
            ".windsurf/skills"
            ".cline/skills"
            ".roo/skills"
            ".continue/skills"
            ".gemini/skills"
            ".amazonq/skills"
            ".qwen/skills"
            ".kilocode/skills"
            ".augment/skills"
            ".kiro/skills"
            ".lingma/skills"
            ".junie/skills"
            ".codebuddy/skills"
            ".cospec/skills"
            ".crush/skills"
            ".factory/skills"
            ".iflow/skills"
            ".pi/skills"
            ".qoder/skills"
            ".agent/skills"
            ".bob/skills"
            ".forge/skills"
            ".trae/skills"
            ".github/skills"
          )
          for sd in "${SKILLS_DIRS[@]}"; do
            test -d "$PROJ/$sd/brainstorming"
            test -d "$PROJ/$sd/using-superpowers"
          done
          echo "All platforms Superpowers: OK"
        shell: bash

      - name: Verify OpenSpec (project)
        run: |
          test -d "$RUNNER_TEMP/comet-e2e-project/openspec"
          echo "OpenSpec: OK"
        shell: bash

      - name: Verify working directories (project)
        run: |
          test -d "$RUNNER_TEMP/comet-e2e-project/docs/superpowers/specs"
          test -d "$RUNNER_TEMP/comet-e2e-project/docs/superpowers/plans"
          echo "Working dirs: OK"
        shell: bash

      - name: Create temp global home with all platform markers
        run: |
          HOME_DIR="$RUNNER_TEMP/comet-e2e-global"
          for dir in .claude .cursor .codex .opencode .windsurf .cline .roo \
                     .continue .gemini .amazonq .qwen .kilocode .augment .kiro \
                     .lingma .junie .codebuddy .cospec .crush .factory .iflow \
                     .pi .qoder .agent .bob .forge .trae; do
            mkdir -p "$HOME_DIR/$dir"
          done
          mkdir -p "$HOME_DIR/.github"
          echo "marker" > "$HOME_DIR/.github/copilot-instructions.md"
        shell: bash

      - name: Run comet init (global scope, all platforms)
        run: |
          export HOME="$RUNNER_TEMP/comet-e2e-global"
          node bin/comet.js init "$RUNNER_TEMP/comet-e2e-global" --yes --scope global --json
        shell: bash

      - name: Verify Comet skills on all platforms (global)
        run: |
          HOME_DIR="$RUNNER_TEMP/comet-e2e-global"
          SKILLS_DIRS=(
            ".claude/skills"
            ".cursor/skills"
            ".codex/skills"
            ".opencode/skills"
            ".windsurf/skills"
            ".cline/skills"
            ".roo/skills"
            ".continue/skills"
            ".gemini/skills"
            ".amazonq/skills"
            ".qwen/skills"
            ".kilocode/skills"
            ".augment/skills"
            ".kiro/skills"
            ".lingma/skills"
            ".junie/skills"
            ".codebuddy/skills"
            ".cospec/skills"
            ".crush/skills"
            ".factory/skills"
            ".iflow/skills"
            ".pi/skills"
            ".qoder/skills"
            ".agent/skills"
            ".bob/skills"
            ".forge/skills"
            ".trae/skills"
            ".github/skills"
          )
          for sd in "${SKILLS_DIRS[@]}"; do
            test -f "$HOME_DIR/$sd/comet/SKILL.md"
            test -f "$HOME_DIR/$sd/comet/scripts/comet-guard.sh"
            test -f "$HOME_DIR/$sd/comet/scripts/comet-state.sh"
            test -f "$HOME_DIR/$sd/comet/scripts/comet-handoff.sh"
            test -f "$HOME_DIR/$sd/comet/scripts/comet-yaml-validate.sh"
            test -f "$HOME_DIR/$sd/comet/scripts/comet-archive.sh"
          done
          echo "All platforms global Comet skills: OK"
        shell: bash

      - name: Verify no working directories (global)
        run: |
          test ! -d "$RUNNER_TEMP/comet-e2e-global/docs/superpowers/specs"
          echo "Global scope has no working dirs: OK"
        shell: bash
